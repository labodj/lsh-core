# lsh-core static configuration source of truth.
#
# Users edit this file; the C++ headers under include/lsh_configs are generated.
# References use names, not dense indexes, so IDs can be sparse and wiring can be
# rearranged without hand-maintaining lookup tables.

[generator]
output_dir = "include"
config_dir = "lsh_configs"
user_config_header = "lsh_user_config.hpp"

[common]
hardware_include = "Controllino.h"
debug_serial = "Serial"
com_serial = "Serial2"

[common.defines]
CONFIG_MSG_PACK = true
CONFIG_USE_FAST_CLICKABLES = true
CONFIG_USE_FAST_ACTUATORS = true
CONFIG_USE_FAST_INDICATORS = true

[devices.j1]
name = "j1"

[[devices.j1.actuators]]
name = "rel0"
id = 1
pin = "CONTROLLINO_R0"
auto_off = "10m"

[[devices.j1.actuators]]
name = "rel1"
id = 2
pin = "CONTROLLINO_R1"
auto_off = "1h"

[[devices.j1.actuators]]
name = "rel2"
id = 3
pin = "CONTROLLINO_R2"
auto_off = "1h"

[[devices.j1.actuators]]
name = "rel3"
id = 4
pin = "CONTROLLINO_R3"
auto_off = "15m"

[[devices.j1.actuators]]
name = "rel4"
id = 5
pin = "CONTROLLINO_R4"

