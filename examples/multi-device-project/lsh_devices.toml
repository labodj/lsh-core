short = ["rel3"]

[[devices.j1.clickables]]
name = "btn4"
id = 5
pin = "CONTROLLINO_A4"
short = ["rel4"]
long = { targets = ["rel4", "rel5"] }

[[devices.j1.clickables]]
name = "btn5"
id = 6
