auto_off = "1h"

[[devices.j1.actuators]]
name = "rel9"
id = 10
pin = "CONTROLLINO_R9"
auto_off = "30m"

[[devices.j1.clickables]]
name = "btn0"
id = 1
pin = "CONTROLLINO_A0"
short = ["rel0"]

[[devices.j1.clickables]]
name = "btn1"
id = 2
pin = "CONTROLLINO_A1"
short = ["rel1"]
long = { targets = ["rel1", "rel2"] }

[[devices.j1.clickables]]
name = "btn2"
id = 3
pin = "CONTROLLINO_A2"
short = ["rel2"]
long = { targets = ["rel2", "rel1"] }

[[devices.j1.clickables]]
name = "btn3"
id = 4
