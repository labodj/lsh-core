short = ["rel5"]
long = { targets = ["rel5", "rel4"] }

[[devices.j1.clickables]]
name = "btn6"
id = 7
pin = "CONTROLLINO_A6"
short = ["rel6"]
long = { targets = ["rel6", "rel4", "rel5"], type = "off_only" }

[[devices.j1.clickables]]
name = "btn7"
id = 8
pin = "CONTROLLINO_A7"
short = ["rel7"]
long = { targets = ["rel7"], time = "900ms" }
super_long = { type = "selective", targets = ["rel1", "rel2"] }

[[devices.j1.clickables]]
name = "btn9"
id = 10
pin = "CONTROLLINO_A9"
short = ["rel9"]

[[devices.j1.clickables]]
name = "btn10"
id = 11
pin = "CONTROLLINO_IN0"
