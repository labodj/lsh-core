[platformio]
description = "Public example LSH-Core installation with multiple devices"
default_envs = J1_release

# =================================================================
# |                  COMMON CONFIGURATION                         |
# |   Settings shared across all environments (debug/release)     |
# =================================================================
[common_base]
platform = atmelavr
framework = arduino
board = controllino_maxi

lib_deps =
    lsh-core=symlink://../..
    # For standalone projects outside this repository, use:
    # https://github.com/labodj/lsh-core.git

# Add the hardware-specific library here (if needed)
    controllino-plc/CONTROLLINO

# TOML is the only device-topology source of truth. The pre-build hook validates
# it, generates the static C++ headers and adds the per-device build defines.
extra_scripts = pre:../../tools/platformio_lsh_static_config.py
custom_lsh_config = lsh_devices.toml

# --- BASE SOURCE FILTER ---
# This is the core of the multi-device setup.
# 1. Include (+) all files in the `src` directory (<*>).
# 2. Exclude (-) the entire `configs` directory.
# This compiles `main.cpp` and any other shared source files automatically,
# but ignores all specific device configurations.
build_src_filter = +<*> -<configs/>

# Static analysis should report actionable issues in this example and lsh-core.
# Third-party packages such as ETL may use syntax that cppcheck cannot parse on
# every host version, so keep dependency noise out of the public report.
check_skip_packages = yes
check_flags =
    cppcheck: -D CONTROLLINO_MAXI
    cppcheck: --suppress=syntaxError:*function_traits.h

build_unflags = -std=gnu++11 -std=c++11
build_flags =
    # Add the 'include' directory to the compiler's search path.
    # This is necessary for the library to find the user's config headers.
    -I include
    -std=gnu++17

# --- GLOBAL DEFAULT FEATURE FLAGS ---
# Uncomment a line here to enable a feature for ALL devices.
# These flags can be overridden or extended in the device-specific sections below.
default_feature_flags =
    # --- Optional low-level serial buffer overrides from the Arduino core ---
    #-D SERIAL_RX_BUFFER_SIZE=256U
    #-D SERIAL_TX_BUFFER_SIZE=128U

    # --- ETL override hook ---
    # Configured in lsh_devices.toml [features].etl_profile_override_header.

    # --- Fast I/O paths ---
    # The example enables these in lsh_devices.toml so every device profile gets
    # the recommended AVR direct-port path. Keep these here only if you prefer
    # forcing them from PlatformIO instead of TOML.
    #-D CONFIG_USE_FAST_CLICKABLES
    #-D CONFIG_USE_FAST_ACTUATORS
    #-D CONFIG_USE_FAST_INDICATORS

    # --- Serial codec ---
    # The example enables MsgPack in lsh_devices.toml because the preferred
    # AVR priority is runtime speed first, then SRAM, then flash. Keep JSON only
    # when bridge compatibility, flash size or inspectability are more important.
    #-D CONFIG_MSG_PACK

    # --- Input / output timing ---
    #-D CONFIG_ACTUATOR_DEBOUNCE_TIME_MS=100U
    #-D CONFIG_CLICKABLE_DEBOUNCE_TIME_MS=20U
    # Policy knob for the input hot path.
    # 1U keeps the historical "~1000 Hz when the loop is otherwise free" policy.
    # Raise it only after measuring the real AVR tradeoff between button latency,
    # serial fairness and CPU headroom on hardware.
    #-D CONFIG_CLICKABLE_SCAN_INTERVAL_MS=1U
    #-D CONFIG_CLICKABLE_LONG_CLICK_TIME_MS=400U
    #-D CONFIG_CLICKABLE_SUPER_LONG_CLICK_TIME_MS=1000U
    #-D CONFIG_LCNB_TIMEOUT_MS=1000U

    # --- Link liveness and bridge resync ---
    #-D CONFIG_PING_INTERVAL_MS=10000U
    #-D CONFIG_CONNECTION_TIMEOUT_MS=10200U
    #-D CONFIG_BRIDGE_BOOT_RETRY_INTERVAL_MS=250U
    #-D CONFIG_BRIDGE_AWAIT_STATE_TIMEOUT_MS=1500U

    # --- Debug serial and controller link ---
    #-D CONFIG_DEBUG_SERIAL_BAUD=115200U
    #-D CONFIG_COM_SERIAL_BAUD=250000U
    #-D CONFIG_COM_SERIAL_TIMEOUT_MS=5U
    #-D CONFIG_COM_SERIAL_MSGPACK_FRAME_IDLE_TIMEOUT_MS=5U
    #-D CONFIG_COM_SERIAL_MAX_RX_BYTES_PER_LOOP=32U
    #-D CONFIG_COM_SERIAL_FLUSH_AFTER_SEND=1

    # --- Loop pacing / housekeeping ---
    #-D CONFIG_DELAY_AFTER_RECEIVE_MS=50U
    #-D CONFIG_NETWORK_CLICK_CHECK_INTERVAL_MS=50U
    #-D CONFIG_ACTUATORS_AUTO_OFF_CHECK_INTERVAL_MS=1000U

    # --- Benchmark helpers ---
    #-D CONFIG_LSH_BENCH
    #-D CONFIG_BENCH_ITERATIONS=1000000U

# --- Base for Release Builds ---
[common_release]
extends = common_base
build_type = release
build_flags = ${common_base.build_flags} -D NDEBUG

# --- Base for Debug Builds ---
[common_debug]
extends = common_base
build_type = debug
build_flags = ${common_base.build_flags} -D LSH_DEBUG

# =================================================================
# |                  FINAL BUILD ENVIRONMENTS                     |
# | Each environment composes the final set of flags and sources. |
# =================================================================

# --- Device J1 ---
[env:J1_release]
extends = common_release
custom_lsh_device = j1
build_src_filter = ${common_base.build_src_filter}
build_flags =
    ${common_release.build_flags}        # Inherit common release flags.
    ${common_base.default_feature_flags} # Optional global feature flags kept outside the generated topology.

[env:J1_debug]
extends = common_debug
custom_lsh_device = j1
build_src_filter = ${common_base.build_src_filter}
build_flags =
    ${common_debug.build_flags}
    ${common_base.default_feature_flags}

# --- Device J2 ---
[env:J2_release]
extends = common_release
custom_lsh_device = j2
build_src_filter = ${common_base.build_src_filter}
build_flags =
    ${common_release.build_flags}
    ${common_base.default_feature_flags}

[env:J2_debug]
extends = common_debug
custom_lsh_device = j2
build_src_filter = ${common_base.build_src_filter}
build_flags =
    ${common_debug.build_flags}
    ${common_base.default_feature_flags}

# --- HOW TO ADD A NEW DEVICE (e.g., "Garage") ---
# 1. Add [devices.garage] to lsh_devices.toml with actuators, buttons,
#    indicators and optional device-level feature/timing/serial overrides.
#
# 2. Create the final build environments by copying an existing block:
# [env:Garage_release]
# extends = common_release
# custom_lsh_device = garage
# build_src_filter = ${common_base.build_src_filter}
# build_flags =
#     ${common_release.build_flags}
#     ${common_base.default_feature_flags}
#
# [env:Garage_debug]
# extends = common_debug
# custom_lsh_device = garage
# build_src_filter = ${common_base.build_src_filter}
# build_flags =
#     ${common_debug.build_flags}
#     ${common_base.default_feature_flags}
