#:schema ../../docs/lsh_devices.schema.json

schema_version = 2
preset = "controllino-maxi/fast-msgpack"

[generator]
output_dir = "generated"
config_dir = "all_options_configs"
user_config_header = "lsh_all_options_config.hpp"
static_config_router_header = "lsh_all_options_static_router.hpp"

[controller]
hardware_include = "Controllino.h"
debug_serial = "Serial"
bridge_serial = "Serial2"
disable_rtc = false
disable_eth = false
controllino_pin_aliases = true

[features]
codec = "msgpack"
fast_io = true
fast_buttons = true
fast_actuators = true
fast_indicators = true
bench = true
bench_iterations = 10000
aggressive_constexpr_ctors = true
etl_profile_override_header = "lsh_etl_profile_override.h"

[timing]
actuator_debounce = "0ms"
button_debounce = "8ms"
scan_interval = "2ms"
long_click = "450ms"
super_long_click = "1200ms"
network_click_timeout = "900ms"
ping_interval = "7s"
connection_timeout = "7300ms"
bridge_boot_retry = "200ms"
bridge_state_timeout = "1300ms"
post_receive_delay = "25ms"
network_click_check_interval = "20ms"
auto_off_check_interval = "250ms"

[serial]
debug_baud = 500000
bridge_baud = 500000
timeout = "4ms"
msgpack_frame_idle_timeout = "4ms"
max_rx_payloads_per_loop = 5
max_rx_bytes_per_loop = 64
flush_after_send = false
rx_buffer_size = 256
tx_buffer_size = 128

[advanced]
build_flags = ["-flto=auto"]

[advanced.defines]
CONFIG_CUSTOM_EXPERIMENTAL_DEFINE = 1

[devices.maximal_panel]
name = "maximal-panel"
build_macro = "LSH_BUILD_ALL_OPTIONS_MAXIMAL"
hardware_include = "<Controllino.h>"
debug_serial = "&Serial"
bridge_serial = "Serial1"
config_include = "custom/maximal_panel_config.hpp"
static_config_include = "custom/maximal_panel_static_config.hpp"
disable_rtc = true
disable_eth = true

[devices.maximal_panel.advanced]
build_flags = ["-Wl,--gc-sections"]

[devices.maximal_panel.advanced.defines]
CONFIG_MAXIMAL_PANEL_EXPERIMENTAL_DEFINE = 1

[devices.maximal_panel.timing]
button_debounce = "12ms"

[devices.maximal_panel.serial]
flush_after_send = true

[devices.maximal_panel.actuators.ceiling]
id = 1
pin = "R0"
default = true
protected = true
auto_off = "10m"

[devices.maximal_panel.actuators.wall]
id = 3
pin = "R1"
auto_off_ms = 45000

[devices.maximal_panel.actuators.fan]
id = 9
pin = "R2"

[devices.maximal_panel.actuators.garden]
id = 250
pin = "R3"
protected = false

[devices.maximal_panel.actuators.pump_a]
id = 12
pin = "R4"
interlock = "pump_b"

[devices.maximal_panel.actuators.pump_b]
id = 13
pin = "R5"
interlock = "pump_a"

[devices.maximal_panel.actuators.door_strike]
id = 14
pin = "R6"
pulse = "300ms"

[devices.maximal_panel.groups.living]
targets = ["ceiling", "wall"]

[devices.maximal_panel.groups.pumps]
targets = ["pump_a", "pump_b"]

[devices.maximal_panel.scenes.movie]
off = "living"
on = "fan"
toggle = "garden"

[devices.maximal_panel.buttons.entry_button]
id = 1
pin = "A0"
short = ["ceiling", "wall"]
long = "fan"
super_long = { action = "all_off" }

[devices.maximal_panel.buttons.scene_button]
id = 4
pin = "A1"
short = { enabled = true, group = "living" }
long = { after = "750ms", scene = "movie", network = true, fallback = "local" }
super_long = { action = "all_off", network = true, fallback = "local" }

[devices.maximal_panel.buttons.off_button]
id = 7
pin = "A2"
short = false
long = { time_ms = 1250, action = "off", targets = ["ceiling", "wall", "fan"] }
super_long = { after = "1800ms", action = "off", targets = ["garden"] }

[devices.maximal_panel.buttons.network_only_button]
id = 11
pin = "A3"
short = false
long = { network = true, fallback = "do_nothing" }
super_long = false

[devices.maximal_panel.buttons.alias_button]
id = 19
pin = "A4"
short = "door_strike"
long = "fan"
super_long = false

[devices.maximal_panel.buttons.pump_button]
id = 20
pin = "A5"
short = "pump_a"
long = { action = "on", target = "pump_b" }
super_long = { action = "off", group = "pumps" }

[devices.maximal_panel.indicators.any_led]
pin = "D0"

[devices.maximal_panel.indicators.any_led.when]
any = ["ceiling", "wall"]

[devices.maximal_panel.indicators.all_led]
pin = "D1"

[devices.maximal_panel.indicators.all_led.when]
all = ["ceiling", "wall"]

[devices.maximal_panel.indicators.majority_led]
pin = "D2"

[devices.maximal_panel.indicators.majority_led.when]
majority = ["ceiling", "wall", "fan"]

[devices.no_network_dense]
name = "no-network-dense"
hardware_include = "Arduino.h"
debug_serial = "Serial"
bridge_serial = "Serial"
controllino_pin_aliases = false

[devices.no_network_dense.features]
codec = "json"
fast_io = false
bench = false
aggressive_constexpr_ctors = false
etl_profile_override_header = false

[devices.no_network_dense.advanced]
build_flags = ["-Os"]

[devices.no_network_dense.actuators.relay_a]
id = 1
pin = "6"

[devices.no_network_dense.actuators.relay_b]
id = 2
pin = "7"

[devices.no_network_dense.buttons.button_a]
id = 1
pin = "8"
short = "relay_a"
long = { action = "off", targets = ["relay_b"] }
super_long = { action = "off", targets = ["relay_a", "relay_b"] }

[devices.no_network_dense.indicators.status]
pin = "9"
when = "relay_a"

[devices.empty_profile]
name = "empty-profile"
build_macro = "LSH_BUILD_EMPTY_PROFILE"
hardware_include = "<Arduino.h>"
debug_serial = "Serial"
bridge_serial = "Serial"
controllino_pin_aliases = false

[devices.empty_profile.features]
codec = "json"
etl_profile_override_header = false
