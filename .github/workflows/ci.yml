name: CI & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: python3 -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install Python tooling
        run: uv sync --locked --only-group dev

      - name: Show clang-format version
        run: uv run clang-format --version

      - name: Check Python formatting, linting and types
        run: |
          uv run ruff format --check tools tests
          uv run ruff check tools tests
          uv run mypy
          uv run pyrefly check

      - name: Run Python tests
        run: uv run pytest

      - name: Check C++ formatting
        run: |
          set -eu
          files=$(git ls-files \
            '*.c' '*.cc' '*.cpp' '*.h' '*.hpp' \
            ':!:vendor/**' \
            ':!:docs/**' \
            ':!:src/communication/constants/protocol.hpp' \
            ':!:src/communication/constants/static_payloads.hpp' \
            | while IFS= read -r file; do
                [ -f "$file" ] && printf '%s\n' "$file"
              done)
          uv run clang-format --dry-run --Werror --style=file $files

      - name: Validate generated protocol artifacts
        run: |
          uv run python tools/update_lsh_protocol.py --check
          uv run python vendor/lsh-protocol/tools/generate_lsh_protocol.py \
            --target shared-doc \
            --shared-doc-root vendor/lsh-protocol \
            --check

      - name: Validate static TOML generation
        run: |
          set -eu
          schema_tmp=$(mktemp)
          tmpdir=$(mktemp -d)
          matrix_tmp=$(mktemp -d)
          trap 'rm -f "$schema_tmp"; rm -rf "$tmpdir" "$matrix_tmp"' EXIT

          uv run python tools/generate_lsh_static_config.py --print-json-schema > "$schema_tmp"
          diff -u docs/lsh_devices.schema.json "$schema_tmp"

          uv run python tools/generate_lsh_static_config.py \
            examples/multi-device-project/lsh_devices.toml \
            --check
          uv run python tools/generate_lsh_static_config.py \
            examples/multi-device-project/lsh_devices.toml \
            --doctor

          cp examples/all-options-toml/lsh_devices.toml "$tmpdir/lsh_devices.toml"
          cp examples/all-options-toml/lsh_devices.lock.toml "$tmpdir/lsh_devices.lock.toml"
          uv run python tools/generate_lsh_static_config.py "$tmpdir/lsh_devices.toml"
          uv run python tools/generate_lsh_static_config.py "$tmpdir/lsh_devices.toml" --check
          uv run python tools/generate_lsh_static_config.py "$tmpdir/lsh_devices.toml" --doctor
          uv run python tools/generate_lsh_static_config.py "$tmpdir/lsh_devices.toml" --list-devices
          uv run python tools/generate_lsh_static_config.py \
            "$tmpdir/lsh_devices.toml" \
            --print-platformio-defines maximal_panel \
            >/dev/null

          cp examples/avr-board-matrix/lsh_devices.toml "$matrix_tmp/lsh_devices.toml"
          cp examples/avr-board-matrix/lsh_devices.lock.toml "$matrix_tmp/lsh_devices.lock.toml"
          uv run python tools/generate_lsh_static_config.py "$matrix_tmp/lsh_devices.toml"
          uv run python tools/generate_lsh_static_config.py "$matrix_tmp/lsh_devices.toml" --check
          uv run python tools/generate_lsh_static_config.py "$matrix_tmp/lsh_devices.toml" --doctor

  build-public-example:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: ["J1_release", "J1_debug", "J2_release", "J2_debug"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('examples/multi-device-project/platformio.ini', 'library.json') }}
          restore-keys: ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: python3 -m pip install --upgrade pip "platformio==6.1.19"

      - name: Build public example
        run: platformio run -d examples/multi-device-project -e "${{ matrix.env }}"

      - name: Static analyze public example
        run: platformio check -d examples/multi-device-project -e "${{ matrix.env }}"

  build-avr-board-matrix:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: ["mega2560_fast_release", "uno_release", "nano_release"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-avr-matrix-${{ hashFiles('examples/avr-board-matrix/platformio.ini', 'library.json') }}
          restore-keys: ${{ runner.os }}-platformio-avr-matrix-

      - name: Install PlatformIO
        run: python3 -m pip install --upgrade pip "platformio==6.1.19"

      - name: Build AVR board matrix
        run: platformio run -d examples/avr-board-matrix -e "${{ matrix.env }}"

      - name: Static analyze AVR board matrix
        run: platformio check -d examples/avr-board-matrix -e "${{ matrix.env }}" --fail-on-defect low

  package-registry-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-package-smoke-${{ hashFiles('library.json') }}
          restore-keys: ${{ runner.os }}-platformio-package-smoke-

      - name: Install PlatformIO
        run: python3 -m pip install --upgrade pip "platformio==6.1.19"

      - name: Pack library and build a registry-style consumer
        run: |
          set -eu
          package_path=$(mktemp --suffix=.tar.gz)
          smoke_dir=$(mktemp -d)
          trap 'rm -f "$package_path"; rm -rf "$smoke_dir"' EXIT

          platformio pkg pack --output "$package_path"
          tar -tzf "$package_path" | grep -F "tools/platformio_lsh_static_config.py"
          tar -tzf "$package_path" | grep -F "docs/lsh_devices.schema.json"
          ! tar -tzf "$package_path" | grep -E '(^|/)(\.venv|\.pio|__pycache__|vendor|\.github)(/|$)'

          mkdir -p "$smoke_dir/src"
          cp examples/avr-board-matrix/src/main.cpp "$smoke_dir/src/main.cpp"
          cp examples/avr-board-matrix/lsh_devices.toml "$smoke_dir/lsh_devices.toml"
          cp examples/avr-board-matrix/lsh_devices.lock.toml "$smoke_dir/lsh_devices.lock.toml"
          cat >"$smoke_dir/platformio.ini" <<EOF
          [env:uno_release]
          platform = atmelavr
          framework = arduino
          board = uno
          lib_deps = file://$package_path
          extra_scripts = pre:.pio/libdeps/uno_release/lsh-core/tools/platformio_lsh_static_config.py
          custom_lsh_config = lsh_devices.toml
          custom_lsh_device = atmega328p_basic
          build_unflags = -std=gnu++11 -std=c++11
          build_flags =
              -I include
              -std=gnu++17
              -D NDEBUG
          EOF

          platformio run -d "$smoke_dir" -e uno_release
          test -f "$smoke_dir/include/lsh_user_config.hpp"

  release:
    needs: [static-checks, build-public-example, build-avr-board-matrix, package-registry-smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Verify library version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          LIBRARY_VERSION=$(python3 -c "import json; print(json.load(open('library.json', 'r', encoding='utf-8'))['version'])")
          if [ "$LIBRARY_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: library.json version ($LIBRARY_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: lsh-core ${{ github.ref_name }}
          generate_release_notes: true

  publish-platformio-registry:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install PlatformIO
        run: python3 -m pip install --upgrade pip "platformio==6.1.19"

      - name: Publish library to PlatformIO Registry
        env:
          PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
        run: |
          set -eu
          if [ -z "${PLATFORMIO_AUTH_TOKEN:-}" ]; then
            echo "PLATFORMIO_AUTH_TOKEN GitHub secret is not configured."
            exit 1
          fi

          package_path=$(mktemp --suffix=.tar.gz)
          trap 'rm -f "$package_path"' EXIT

          platformio pkg pack --output "$package_path"
          platformio pkg publish "$package_path" --owner labodj --type library --no-interactive

  publish-release-docs:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger release-aligned Doxygen deployment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh workflow run doxygen-pages.yml --repo "$GH_REPO" --ref main -f checkout_ref="refs/tags/${GITHUB_REF_NAME}"
