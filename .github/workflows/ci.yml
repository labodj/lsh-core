name: CI & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: python3 -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install Python tooling
        run: uv sync --locked --only-group dev

      - name: Show clang-format version
        run: uv run clang-format --version

      - name: Check Python formatting, linting and types
        run: |
          uv run ruff format --check tools tests
          uv run ruff check tools tests
          uv run mypy
          uv run pyrefly check

      - name: Run Python tests
        run: uv run pytest

      - name: Check C++ formatting
        run: |
          set -eu
          files=$(git ls-files \
            '*.c' '*.cc' '*.cpp' '*.h' '*.hpp' \
            ':!:vendor/**' \
            ':!:docs/**' \
            ':!:src/communication/constants/protocol.hpp' \
            ':!:src/communication/constants/static_payloads.hpp' \
            | while IFS= read -r file; do
                [ -f "$file" ] && printf '%s\n' "$file"
              done)
          uv run clang-format --dry-run --Werror --style=file $files

      - name: Validate generated protocol artifacts
        run: |
          uv run python tools/update_lsh_protocol.py --check
          uv run python vendor/lsh-protocol/tools/generate_lsh_protocol.py \
            --target shared-doc \
            --shared-doc-root vendor/lsh-protocol \
            --check

      - name: Validate static TOML generation
        run: |
          set -eu
          uv run python tools/generate_lsh_static_config.py \
            examples/multi-device-project/lsh_devices.toml \
            --check

          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp examples/all-options-toml/lsh_devices.toml "$tmpdir/lsh_devices.toml"
          uv run python tools/generate_lsh_static_config.py "$tmpdir/lsh_devices.toml"
          uv run python tools/generate_lsh_static_config.py "$tmpdir/lsh_devices.toml" --check
          uv run python tools/generate_lsh_static_config.py "$tmpdir/lsh_devices.toml" --list-devices
          uv run python tools/generate_lsh_static_config.py \
            "$tmpdir/lsh_devices.toml" \
            --print-platformio-defines maximal_panel \
            >/dev/null

  build-public-example:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: ["J1_release", "J1_debug", "J2_release", "J2_debug"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('examples/multi-device-project/platformio.ini', 'library.json') }}
          restore-keys: ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: python3 -m pip install --upgrade pip "platformio==6.1.19"

      - name: Build public example
        run: platformio run -d examples/multi-device-project -e "${{ matrix.env }}"

  release:
    needs: [static-checks, build-public-example]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Verify library version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          LIBRARY_VERSION=$(python3 -c "import json; print(json.load(open('library.json', 'r', encoding='utf-8'))['version'])")
          if [ "$LIBRARY_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: library.json version ($LIBRARY_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: lsh-core ${{ github.ref_name }}
          generate_release_notes: true

  publish-release-docs:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger release-aligned Doxygen deployment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh workflow run doxygen-pages.yml --repo "$GH_REPO" --ref main -f checkout_ref="refs/tags/${GITHUB_REF_NAME}"
