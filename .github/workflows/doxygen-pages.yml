# GitHub Actions workflow for generating and deploying release-aligned Doxygen documentation

name: Deploy Release Doxygen Documentation

on:
  push:
    tags: ["v*"]

  workflow_dispatch:
    inputs:
      checkout_ref:
        description: "Optional git ref to publish instead of the triggering ref"
        required: false
        type: string

# Grant GITHUB_TOKEN the necessary permissions to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}
          submodules: "recursive"

      - name: Install Graphviz and Doxygen
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y graphviz doxygen
          doxygen --version

      - name: Verify generated protocol artifacts
        run: |
          python3 tools/update_lsh_protocol.py --check
          python3 vendor/lsh-protocol/tools/generate_lsh_protocol.py \
            --target shared-doc \
            --shared-doc-root vendor/lsh-protocol \
            --check

      - name: Build Doxygen documentation
        run: doxygen docs/Doxyfile

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./docs/html"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
